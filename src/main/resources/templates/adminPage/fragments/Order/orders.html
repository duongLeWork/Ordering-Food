<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Orders</title>
</head>
<body>
<div th:fragment="orderList" th:if="${activePage == 'orders'}">
  <!-- Orders Page Content -->
  <div class="container mt-4">
    <h1>Orders</h1>

    <!-- Search and Filter Section -->
    <div class="d-flex justify-content-between mb-3">
      <input type="text" class="form-control w-25" placeholder="Search" />
      <select class="form-select w-25">
        <option selected>All Status</option>
        <option value="1">New Order</option>
        <option value="2">Processing</option>
        <option value="3">Canceled</option>
      </select>
      <div>
        <input type="text" class="form-control" placeholder="10 Jan - 20 Jan" />
        <button class="btn btn-primary">Export</button>
      </div>
    </div>

    <!-- Orders Table -->
    <table class="table table-bordered">
      <thead>
      <tr>
        <th><input type="checkbox" /></th>
        <th>Order Id</th>
        <th>Customer</th>
        <th>Items</th>
        <th>Amounts</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}">
        <td><input type="checkbox" /></td>
        <td th:text="${order.foodOrderId}">#001001</td>
        <td th:text="${order.customer.name}">Devon Lane</td>
        <td th:text="${order.orderMenu.menuItem}">Pizza</td>
        <td th:text="${order.price}">250</td>
        <td>
          <span class="badge" th:class="${order.orderStatus.status == 'New Order' ? 'bg-secondary' : (order.orderStatus.status == 'Processing' ? 'bg-warning' : 'bg-danger')}" th:text="${order.orderStatus.status}"></span>
        </td>
        <td>
          <a href="#" class="btn btn-sm btn-outline-primary">
            <i class="fa-solid fa-eye"></i> View
          </a>
        </td>
      </tr>
      </tbody>
    </table>


    <!-- Pagination -->
    <div class="d-flex justify-content-between mt-4">
            <span>Rows per page: <select class="form-select w-auto">
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
            </select></span>
      <div>
        <button class="btn btn-outline-secondary">1</button>
        <button class="btn btn-outline-secondary">2</button>
        <button class="btn btn-outline-secondary">3</button>
        <button class="btn btn-outline-secondary">Next</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
