<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div th:fragment="paymentMethodPage">
    <!-- Payment Method Section -->
    <h3>Payment Method</h3>

    <!-- Payment Methods List -->
    <div class="payment-methods-list">
        <div class="col-md-4" th:each="paymentMethod : ${paymentMethods}">
            <div class="card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="d-flex">
                        <span class="badge" th:text="${paymentMethod.name}">Payment Method Name</span>
                        <p class="card-text" th:text="${paymentMethod.description}">Payment Method Description</p>
                    </div>
                    <button class="btn btn-light">
                        <i class="fa-solid fa-toggle-on"></i> <!-- or use fa-toggle-off depending on the state -->
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
